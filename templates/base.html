<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>JobTrackr</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/@tabler/icons@2.47.0/iconfont/tabler-icons.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-white">

<!-- NAVBAR -->
<nav class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center shadow-md">

    <!-- BRAND -->
    <div class="text-xl font-bold flex items-center gap-2">
        <i class="ti ti-briefcase"></i>
        JobTrackr
    </div>

    <!-- THEME TOGGLE -->
    <button id="themeToggle"
            class="px-3 py-2 rounded-lg text-sm font-medium
                   bg-gray-200 dark:bg-gray-700
                   text-gray-800 dark:text-white
                   hover:scale-105 transition">
        🌙
    </button>

    <!-- NAV LINKS -->
    <div class="flex items-center gap-6 text-sm">

        <a href="/jobs/"
           class="{% if request.path == '/jobs/' %}text-blue-400 font-semibold{% else %}hover:text-blue-400{% endif %}">
            Jobs
        </a>

        <a href="/jobs/add/"
           class="{% if request.path == '/jobs/add/' %}text-blue-400 font-semibold{% else %}hover:text-blue-400{% endif %}">
            Add Job
        </a>

    </div>

    <!-- USER MENU -->
    <div class="relative group">

        <button class="flex items-center gap-2 hover:text-blue-400 transition">
            <i class="ti ti-user-circle"></i>

            {% if request.user.is_authenticated %}
                {{ request.user.username }}
            {% else %}
                Guest
            {% endif %}

            <i class="ti ti-chevron-down text-xs"></i>
        </button>

        <!-- DROPDOWN -->
        <div class="absolute right-0 mt-2 w-40 bg-white text-black rounded-lg shadow-lg
                    opacity-0 invisible group-hover:opacity-100 group-hover:visible
                    transition">

            <a href="/jobs/" class="block px-4 py-2 hover:bg-gray-100">
                Dashboard
            </a>

            <a href="/accounts/logout/"
               class="block px-4 py-2 hover:bg-gray-100 text-red-500">
                Logout
            </a>

        </div>

    </div>

</nav>

<!-- MAIN -->
<main class="max-w-6xl mx-auto p-6">
    {% block content %}{% endblock %}
</main>

<!-- THEME SCRIPT -->
<script>
(function () {
    const root = document.documentElement;
    const savedTheme = localStorage.getItem("theme");
    const btn = document.getElementById("themeToggle");

    function setIcon() {
        btn.innerText = root.classList.contains("dark") ? "🌙" : "☀️";
    }

    // Apply saved theme
    if (savedTheme === "light") {
        root.classList.remove("dark");
    } else {
        root.classList.add("dark");
    }

    if (btn) {
        btn.addEventListener("click", () => {
            root.classList.toggle("dark");

            localStorage.setItem(
                "theme",
                root.classList.contains("dark") ? "dark" : "light"
            );

            setIcon();
        });

        setIcon();
    }
})();
</script>

</body>
</html>
