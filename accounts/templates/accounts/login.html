{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-gray-800 to-black">

    <!-- Glass Card -->
    <div class="w-full max-w-md p-8 rounded-2xl
                bg-white/10 backdrop-blur-xl border border-white/20
                shadow-2xl">

        <!-- Title -->
        <h2 class="text-3xl font-bold text-white text-center mb-2">
            Welcome Back
        </h2>

        <p class="text-center text-gray-300 mb-6 text-sm">
            Sign in to continue to your dashboard
        </p>
        

        <!-- Form -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Username -->
            <input type="text"
                   name="username"
                   placeholder="Username"
                   class="w-full px-4 py-3 rounded-lg
                          bg-white/10 text-white placeholder-gray-300
                          border border-white/20
                          focus:outline-none focus:ring-2 focus:ring-blue-500">

            <!-- Password -->
            <input type="password"
                   name="password"
                   placeholder="Password"
                   class="w-full px-4 py-3 rounded-lg
                          bg-white/10 text-white placeholder-gray-300
                          border border-white/20
                          focus:outline-none focus:ring-2 focus:ring-blue-500">

            <!-- Login Button -->
            <button type="submit"
                    class="w-full py-3 rounded-lg font-semibold
                           bg-gradient-to-r from-blue-500 to-purple-600
                           hover:from-blue-600 hover:to-purple-700
                           transition transform hover:scale-[1.02] text-white">
                Sign In
            </button>
            
        </form>
<!-- Footer -->
<p class="text-center text-gray-400 text-xs mt-6">
    Don’t have an account?
</p>

<div class="mt-3 text-center">
    <a href="/accounts/register/"
       class="inline-block w-full py-3 rounded-lg font-semibold
              bg-gradient-to-r from-green-500 to-emerald-600
              hover:from-green-600 hover:to-emerald-700
              transition transform hover:scale-[1.02] text-white">
        Create Account
    </a>
</div>

    </div>
</div>

{% endblock %}
